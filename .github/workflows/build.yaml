name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Generate build system
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Run tests
        run: make check

      - name: Build
        run: make all
