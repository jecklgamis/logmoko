name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.distro }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            container: ubuntu:24.04
            install: apt-get update && apt-get install -y gcc make autoconf automake libtool
          - distro: alpine-3.21
            container: alpine:3.21
            install: apk add --no-cache bash gcc musl-dev make autoconf automake libtool
          - distro: fedora-41
            container: fedora:41
            install: dnf install -y gcc make autoconf automake libtool

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Generate build system
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Run tests
        run: make check

      - name: Build
        run: make all
