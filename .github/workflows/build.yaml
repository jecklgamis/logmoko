name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.distro }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            runs-on: ubuntu-latest
            container: ubuntu:24.04
            install: apt-get update && apt-get install -y gcc make autoconf automake libtool libssl-dev
          - distro: alpine-3.21
            runs-on: ubuntu-latest
            container: alpine:3.21
            install: apk add --no-cache bash gcc musl-dev make autoconf automake libtool openssl-dev
          - distro: fedora-41
            runs-on: ubuntu-latest
            container: fedora:41
            install: dnf install -y gcc make autoconf automake libtool openssl-devel
          - distro: debian-12
            runs-on: ubuntu-latest
            container: debian:12
            install: apt-get update && apt-get install -y gcc make autoconf automake libtool libssl-dev
          - distro: amazonlinux-2023
            runs-on: ubuntu-latest
            container: amazonlinux:2023
            prereqs: dnf install -y tar gzip
            install: dnf install -y gcc make autoconf automake libtool openssl-devel
          - distro: macos-14
            runs-on: macos-14
            container: ""
            install: brew install autoconf automake libtool openssl@3
            configure_flags: CPPFLAGS="-I/opt/homebrew/opt/openssl@3/include" LDFLAGS="-L/opt/homebrew/opt/openssl@3/lib"

    steps:
      - name: Install checkout prerequisites
        if: matrix.prereqs != ''
        run: ${{ matrix.prereqs }}

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Generate build system
        run: ./autogen.sh

      - name: Configure
        run: ./configure ${{ matrix.configure_flags }}

      - name: Run tests
        run: make check

      - name: Build
        run: make all
