[global]
log_buffer_size = 2048
ring_buffer_size = 256
default_level = info

[handler:console]
type  = console
level = trace

[handler:file]
type     = file
level    = trace
filename = app.log

[handler:remote]
type     = socket
level    = trace
listener = 127.0.0.1:9000

[logger:app]
level    = info
handlers = console, file, remote

